<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DUNGEON · Warden</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #000000;
      --panel:  #0d0c09;
      --panel2: #111009;
      --gold:   #a07840;
      --gold2:  #c8a050;
      --bone:   #c8b898;
      --dim:    #5a5040;
      --dimmer: #2e2820;
      --blood:  #6a1a1a;
      --green:  #3a6a3a;
      --green2: #5aaa5a;
      --line:   rgba(160,120,64,0.15);
      --line2:  rgba(160,120,64,0.3);
    }

    html, body {
      min-height: 100vh;
      background: var(--black);
      color: var(--bone);
      font-family: 'Cinzel', 'Palatino Linotype', Palatino, Georgia, serif;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 150% 150% at 50% 0%, transparent 50%, rgba(0,0,0,0.5) 100%);
      pointer-events: none; z-index: 0;
    }

    .gold-rule {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold2), transparent);
    }

    .gold-rule-sm {
      width: 48px; height: 1px;
      background: var(--gold); opacity: 0.5;
    }

    /* ── Lock ─────────────────────────────────────────── */
    #lockScreen {
      position: fixed; inset: 0; z-index: 200;
      background: var(--black);
      display: flex; align-items: center; justify-content: center;
    }

    .lock-wrap {
      width: 320px;
      text-align: center;
    }

    .lock-title {
      font-size: 10px;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 400;
      margin-bottom: 14px;
    }

    .lock-sub {
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 40px;
    }

    .lock-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line2);
      color: var(--bone);
      font-family: 'Cinzel', Palatino, serif;
      font-size: 16px;
      letter-spacing: 0.3em;
      text-align: center;
      padding: 12px 0;
      outline: none;
      margin-bottom: 32px;
      transition: border-color 0.2s;
      border-radius: 0;
    }
    .lock-input:focus { border-bottom-color: var(--gold2); }

    .lock-btn {
      background: transparent; border: none;
      border-bottom: 1px solid var(--gold);
      color: var(--gold2);
      font-family: 'Cinzel', Palatino, serif;
      font-size: 9px; letter-spacing: 0.5em; text-transform: uppercase;
      padding: 10px 0; width: 100%;
      cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .lock-btn:hover { color: var(--bone); border-bottom-color: var(--bone); }

    .lock-error {
      margin-top: 16px;
      font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--blood); display: none;
    }

    /* ── App ──────────────────────────────────────────── */
    #adminApp { display: none; position: relative; z-index: 1; min-height: 100vh; }

    /* Top bar */
    .topbar {
      border-bottom: 1px solid var(--line);
      padding: 20px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .topbar-name {
      font-size: 10px; letter-spacing: 0.55em; text-transform: uppercase;
      color: var(--gold); font-weight: 400;
    }

    .topbar-right { display: flex; align-items: center; gap: 24px; }

    .topbar-link {
      font-size: 8px; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--dimmer); text-decoration: none; background: none;
      border: none; cursor: pointer; font-family: 'Cinzel', serif;
      transition: color 0.2s;
    }
    .topbar-link:hover { color: var(--gold); }

    /* Ledger stats */
    .ledger {
      display: grid; grid-template-columns: repeat(4,1fr);
      border-bottom: 1px solid var(--line);
    }

    .ledger-cell {
      padding: 28px 32px;
      border-right: 1px solid var(--line);
    }
    .ledger-cell:last-child { border-right: none; }

    .ledger-label {
      font-size: 8px; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 8px;
    }

    .ledger-val {
      font-size: 36px; letter-spacing: 0.05em;
      color: var(--bone); font-weight: 400;
      line-height: 1;
    }

    /* Main content */
    .main { padding: 36px 40px; }

    .list-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }

    .list-label {
      font-size: 8px; letter-spacing: 0.45em; text-transform: uppercase;
      color: var(--gold);
    }

    .filters { display: flex; gap: 2px; }

    .filter-btn {
      font-family: 'Cinzel', serif;
      font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase;
      padding: 5px 12px;
      background: transparent; border: 1px solid transparent;
      color: var(--dim); cursor: pointer; transition: all 0.15s;
    }
    .filter-btn:hover { color: var(--bone); border-color: var(--line2); }
    .filter-btn.active { color: var(--gold2); border-color: var(--line2); }

    /* Petition rows */
    .petition-list { display: flex; flex-direction: column; }

    .petition {
      border-bottom: 1px solid var(--line);
      padding: 22px 0;
      display: grid; grid-template-columns: 1fr auto;
      gap: 20px; align-items: start;
    }
    .petition:last-child { border-bottom: none; }

    .pet-name {
      font-size: 14px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--bone); margin-bottom: 6px; font-weight: 400;
    }

    .pet-email {
      font-size: 10px; letter-spacing: 0.06em;
      color: var(--dim); margin-bottom: 12px;
    }

    .pet-meta {
      display: flex; flex-wrap: wrap; gap: 20px;
    }

    .pet-meta-item { }

    .meta-label {
      font-size: 7px; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--dimmer); margin-bottom: 3px;
    }

    .meta-val {
      font-size: 10px; letter-spacing: 0.06em; color: var(--dim);
    }

    .pet-notes {
      margin-top: 10px;
      font-size: 10px; letter-spacing: 0.05em; color: var(--dim);
      font-style: italic;
    }

    /* Status */
    .status-mark {
      font-size: 7px; letter-spacing: 0.3em; text-transform: uppercase;
      padding: 3px 0;
    }
    .status-mark.pending { color: var(--gold); }
    .status-mark.done    { color: var(--green2); }
    .status-mark.skipped { color: var(--dimmer); }

    /* Actions */
    .pet-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

    .act-btn {
      font-family: 'Cinzel', serif;
      font-size: 7px; letter-spacing: 0.25em; text-transform: uppercase;
      background: none; border: none; border-bottom: 1px solid transparent;
      color: var(--dim); cursor: pointer; padding: 2px 0;
      transition: color 0.15s, border-color 0.15s;
    }
    .act-btn:hover { color: var(--bone); border-bottom-color: var(--line2); }
    .act-btn.gold  { color: var(--gold); }
    .act-btn.gold:hover  { color: var(--gold2); border-bottom-color: var(--gold); }
    .act-btn.green { color: var(--green2); }
    .act-btn.green:hover { border-bottom-color: var(--green2); }
    .act-btn.red   { color: var(--blood); }
    .act-btn.red:hover   { color: #a03030; border-bottom-color: var(--blood); }

    .pet-date {
      font-size: 7px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--dimmer); margin-top: 6px;
    }

    /* Empty */
    .empty {
      text-align: center; padding: 72px 0; color: var(--dim);
    }
    .empty-title {
      font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 12px; font-weight: 400;
    }
    .empty-sub {
      font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--dimmer);
    }

    /* Modal veil */
    .modal-veil {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.88);
      display: none; align-items: center; justify-content: center;
    }
    .modal-veil.open { display: flex; }

    .modal-box {
      width: 480px; max-width: 95vw;
      max-height: 90vh; overflow-y: auto;
      background: var(--black);
      border: 1px solid var(--line2);
      padding: 40px;
    }

    .modal-title {
      font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 8px;
    }

    .modal-rule { margin-bottom: 28px; }

    .modal-decree {
      font-size: 11px; letter-spacing: 0.05em;
      color: var(--dim); line-height: 1.8; margin-bottom: 24px;
    }
    .modal-decree strong { color: var(--bone); font-weight: 400; }

    .cred-label {
      font-size: 7px; letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--dim); margin-bottom: 8px;
    }

    .copy-row {
      display: flex; gap: 10px; align-items: center; margin-bottom: 10px;
    }
    .copy-row input {
      flex: 1; background: transparent; border: none;
      border-bottom: 1px solid var(--line2);
      color: var(--bone); font-family: 'Cinzel', serif; font-size: 12px;
      letter-spacing: 0.05em; padding: 8px 0; outline: none; border-radius: 0;
    }
    .copy-mini {
      font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 0.25em;
      text-transform: uppercase; background: none; border: none;
      border-bottom: 1px solid var(--line2); color: var(--dim);
      cursor: pointer; padding: 8px 0; transition: color 0.15s;
      white-space: nowrap;
    }
    .copy-mini:hover { color: var(--gold); }
    .copy-mini.copied { color: var(--green2); }

    .pw-row {
      display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
    }
    .pw-val {
      font-size: 12px; letter-spacing: 0.1em; color: var(--bone);
    }

    .modal-steps {
      font-size: 10px; letter-spacing: 0.05em;
      color: var(--dim); line-height: 2.2; margin-bottom: 8px;
    }
    .modal-steps strong { color: var(--bone); font-weight: 400; }
    .modal-steps a { color: var(--gold); text-decoration: none; }
    .modal-steps a:hover { color: var(--gold2); }

    .modal-notes {
      margin-top: 16px; padding: 14px 0;
      border-top: 1px solid var(--line);
      font-size: 10px; letter-spacing: 0.05em;
      color: var(--dim); line-height: 1.8; font-style: italic;
    }
    .modal-notes strong { color: var(--dim); font-style: normal; font-weight: 400; }

    .modal-actions {
      display: flex; justify-content: flex-end; gap: 20px;
      margin-top: 32px; padding-top: 24px;
      border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>

<!-- Lock -->
<div id="lockScreen">
  <div class="lock-wrap">
    <div class="lock-title">Dungeon</div>
    <div class="gold-rule" style="margin-bottom: 14px;"></div>
    <div class="lock-sub">Warden's Gate</div>
    <input class="lock-input" type="password" id="pinInput" placeholder="· · · · · ·"
      onkeydown="if(event.key==='Enter')unlock()" />
    <button class="lock-btn" onclick="unlock()">Enter</button>
    <div class="lock-error" id="lockError">The gate does not yield.</div>
  </div>
</div>

<!-- Admin -->
<div id="adminApp">

  <div class="topbar">
    <div class="topbar-name">Dungeon</div>
    <div class="topbar-right">
      <a href="/" class="topbar-link">← The Gate</a>
      <button class="topbar-link" onclick="logout()">Bar the Gate</button>
    </div>
  </div>

  <div class="ledger">
    <div class="ledger-cell">
      <div class="ledger-label">Total</div>
      <div class="ledger-val" id="statTotal">—</div>
    </div>
    <div class="ledger-cell">
      <div class="ledger-label">Awaiting</div>
      <div class="ledger-val" id="statPending" style="color:var(--gold2)">—</div>
    </div>
    <div class="ledger-cell">
      <div class="ledger-label">Granted</div>
      <div class="ledger-val" id="statDone" style="color:var(--green2)">—</div>
    </div>
    <div class="ledger-cell">
      <div class="ledger-label">Turned Away</div>
      <div class="ledger-val" id="statSkipped" style="color:var(--dimmer)">—</div>
    </div>
  </div>

  <div class="main">
    <div class="list-header">
      <div class="list-label">Petitions</div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" onclick="setFilter('pending',this)">Awaiting</button>
        <button class="filter-btn" onclick="setFilter('done',this)">Granted</button>
        <button class="filter-btn" onclick="setFilter('skipped',this)">Turned Away</button>
      </div>
    </div>

    <div class="gold-rule" style="margin-bottom:0"></div>
    <div class="petition-list" id="petitionList"></div>
  </div>

</div>

<!-- Modal -->
<div class="modal-veil" id="setupModal">
  <div class="modal-box">
    <div class="modal-title">Grant Entry</div>
    <div class="gold-rule modal-rule"></div>
    <div id="setupContent"></div>
    <div class="modal-actions">
      <button class="act-btn" onclick="closeModal()">Dismiss</button>
      <button class="act-btn green" onclick="markDone()">Mark as Granted</button>
    </div>
  </div>
</div>

<script>
  let currentFilter = 'all';
  let activeId = null;

  const STATUS_LABEL = { pending: 'Awaiting', done: 'Granted', skipped: 'Turned Away' };

  // ── Auth ────────────────────────────────────────────────
  async function unlock() {
    const pw = document.getElementById('pinInput').value;
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw }),
      });
      if (res.ok) {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        loadAll();
      } else {
        const d = await res.json();
        document.getElementById('lockError').textContent = d.error || 'The gate does not yield.';
        document.getElementById('lockError').style.display = 'block';
        document.getElementById('pinInput').value = '';
        document.getElementById('pinInput').focus();
      }
    } catch {
      document.getElementById('lockError').textContent = 'The gate is unreachable.';
      document.getElementById('lockError').style.display = 'block';
    }
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    document.getElementById('lockScreen').style.display = 'flex';
    document.getElementById('adminApp').style.display = 'none';
    document.getElementById('pinInput').value = '';
    document.getElementById('lockError').style.display = 'none';
  }

  fetch('/api/me').then(r => r.json()).then(d => {
    if (d.authenticated) {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('adminApp').style.display = 'block';
      loadAll();
    } else {
      document.getElementById('pinInput').focus();
    }
  });

  // ── Data ────────────────────────────────────────────────
  async function loadAll() {
    await Promise.all([loadStats(), loadPetitions()]);
  }

  async function loadStats() {
    const d = await fetch('/api/stats').then(r => r.json());
    document.getElementById('statTotal').textContent   = d.total;
    document.getElementById('statPending').textContent = d.pending;
    document.getElementById('statDone').textContent    = d.done;
    document.getElementById('statSkipped').textContent = d.skipped;
  }

  async function loadPetitions() {
    const url = currentFilter === 'all' ? '/api/requests' : `/api/requests?status=${currentFilter}`;
    const rows = await fetch(url).then(r => r.json());
    renderPetitions(rows);
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    loadPetitions();
  }

  function fmt(dt) {
    if (!dt) return '';
    return new Date(dt).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
  }

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

  function renderPetitions(rows) {
    const el = document.getElementById('petitionList');
    if (!rows.length) {
      el.innerHTML = `<div class="empty">
        <div class="empty-title">${currentFilter === 'all' ? 'No Petitions' : STATUS_LABEL[currentFilter]}</div>
        <div class="empty-sub">${currentFilter === 'all' ? 'None have sought entry.' : 'The ledger is empty here.'}</div>
      </div>`;
      return;
    }

    el.innerHTML = rows.map(r => `
      <div class="petition" id="card-${r.id}">
        <div>
          <div class="pet-name">${r.first_name} ${r.last_name}</div>
          <div class="pet-email">${r.email}</div>
          <div class="pet-meta">
            <span class="status-mark ${r.status}">${STATUS_LABEL[r.status] || r.status}</span>
            ${r.phone ? `<div class="pet-meta-item"><div class="meta-label">Phone</div><div class="meta-val">${r.phone}</div></div>` : ''}
            ${r.language ? `<div class="pet-meta-item"><div class="meta-label">Language</div><div class="meta-val">${r.language}</div></div>` : ''}
            ${r.referral ? `<div class="pet-meta-item"><div class="meta-label">Referred By</div><div class="meta-val">${r.referral}</div></div>` : ''}
          </div>
          ${r.notes ? `<div class="pet-notes">${r.notes}</div>` : ''}
        </div>
        <div class="pet-actions">
          ${r.status === 'pending' ? `
            <button class="act-btn gold" onclick="openSetup('${r.id}','${esc(r.first_name)}','${esc(r.last_name)}','${esc(r.email)}','${esc(r.language)}','${esc(r.notes)}')">Grant Entry</button>
            <button class="act-btn" onclick="setStatus('${r.id}','skipped')">Turn Away</button>
          ` : r.status === 'done' ? `
            <button class="act-btn" onclick="setStatus('${r.id}','pending')">Reopen</button>
          ` : `
            <button class="act-btn gold" onclick="openSetup('${r.id}','${esc(r.first_name)}','${esc(r.last_name)}','${esc(r.email)}','${esc(r.language)}','${esc(r.notes)}')">Grant Entry</button>
            <button class="act-btn" onclick="setStatus('${r.id}','pending')">Reopen</button>
          `}
          <button class="act-btn red" onclick="deletePetition('${r.id}')">Expunge</button>
          <div class="pet-date">${fmt(r.created_at)}</div>
        </div>
      </div>
    `).join('');
  }

  async function setStatus(id, status) {
    await fetch(`/api/requests/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status }),
    });
    loadAll();
  }

  async function deletePetition(id) {
    if (!confirm('Expunge this petition from the ledger?')) return;
    await fetch(`/api/requests/${id}`, { method: 'DELETE' });
    loadAll();
  }

  // ── Setup modal ─────────────────────────────────────────
  function genPassword(firstName) {
    const base = (firstName||'Vault').charAt(0).toUpperCase() + (firstName||'vault').slice(1).toLowerCase();
    return base + Math.floor(Math.random()*900+100) + ['!','@','#','$','&'][Math.floor(Math.random()*5)];
  }

  function openSetup(id, firstName, lastName, email, language, notes) {
    activeId = id;
    const pw = genPassword(firstName);
    document.getElementById('setupContent').innerHTML = `
      <div class="modal-decree">
        Prepare passage for <strong>${firstName} ${lastName}</strong>.<br>
        Create their account, then outfit it with thy addons.
      </div>

      <div class="cred-label">Email</div>
      <div class="copy-row">
        <input readonly value="${email}" />
        <button class="copy-mini" onclick="copyMini(this,'${esc(email)}')">Copy</button>
      </div>

      <div class="cred-label" style="margin-top:6px">Suggested Password</div>
      <div class="pw-row">
        <span class="pw-val">${pw}</span>
        <button class="copy-mini" onclick="copyMini(this,'${pw}')">Copy</button>
      </div>

      <div class="modal-steps">
        <strong>The Ritual</strong><br>
        I. <a href="https://www.stremio.com/register" target="_blank">Create account on Stremio ↗</a><br>
        II. Sign into <a href="https://web.stremio.com" target="_blank">web.stremio.com ↗</a> as thyself — Settings → Addons<br>
        III. Note addon URLs, then sign in as <strong>${firstName}</strong> and install the same<br>
        ${language ? `IV. Set subtitle language to <strong>${language}</strong>` : ''}
      </div>
      ${notes ? `<div class="modal-notes"><strong>Notes:</strong> ${notes}</div>` : ''}
    `;
    document.getElementById('setupModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('setupModal').classList.remove('open');
    activeId = null;
  }

  function markDone() {
    if (activeId) { setStatus(activeId, 'done'); closeModal(); }
  }

  function copyMini(btn, text) {
    navigator.clipboard.writeText(text).catch(() => {});
    const orig = btn.textContent;
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  }

  document.getElementById('setupModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.getElementById('pinInput').focus();
</script>
</body>
</html>
