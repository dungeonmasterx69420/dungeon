<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Dungeon · Thread</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060908;--surface:#141c19;--surface2:#0d1311;--border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.28);--green:#34d399;--green-bg:rgba(52,211,153,0.08);--text:#dce8e3;--muted:#6f8f84;--muted2:#8fa89e;--red:#f87171;--amber:#fbbf24}
    html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .logo{font-family:'Press Start 2P','Minecraft',monospace !important;font-size:11px !important;font-weight:400 !important;color:var(--green);letter-spacing:0.04em;text-decoration:none}
    .nav{display:flex;align-items:center;gap:20px}
    .nav a,.nav button{font-size:13px;color:var(--muted);text-decoration:none;font-weight:500;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .2s}
    .nav a:hover,.nav button:hover{color:var(--text)}
    .page{max-width:860px;margin:0 auto;padding:32px 24px 80px}
    .breadcrumb{font-size:13px;color:var(--muted);margin-bottom:20px}
    .breadcrumb a{color:var(--green);text-decoration:none}
    .breadcrumb a:hover{text-decoration:underline}

    /* Thread header */
    .thread-header{margin-bottom:24px}
    .thread-badges{display:flex;gap:6px;margin-bottom:8px}
    .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px}
    .badge-pin{background:rgba(52,211,153,0.12);color:var(--green)}
    .badge-lock{background:rgba(148,163,160,0.12);color:var(--muted2)}
    .thread-title{font-family:'Press Start 2P','Minecraft',monospace;font-size:9px;font-weight:400;color:var(--text);margin-bottom:12px;line-height:1.8}
    .thread-meta{font-size:13px;color:var(--muted)}
    .thread-meta a{color:var(--green);text-decoration:none}
    .thread-meta a:hover{text-decoration:underline}

    /* Mod controls */
    .mod-bar{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
    .mod-btn{font-size:12px;font-weight:500;padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--muted2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
    .mod-btn:hover{border-color:var(--green);color:var(--green)}
    .mod-btn.danger:hover{border-color:var(--red);color:var(--red)}
    .divider{height:1px;background:var(--border);margin:20px 0}

    /* Posts */
    .post{display:grid;grid-template-columns:48px 1fr;gap:14px;padding:18px 0;border-bottom:1px solid var(--border)}
    .post:last-child{border-bottom:none}
    .post-avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#0b0f0e;flex-shrink:0;overflow:hidden;margin-top:2px}
    .post-avatar img{width:100%;height:100%;object-fit:cover}
    .post-author{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
    .post-screenname{font-size:13px;font-weight:600;color:var(--text);text-decoration:none}
    .post-screenname:hover{color:var(--green)}
    .tier-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
    .tier-dot{width:5px;height:5px;border-radius:50%}
    .post-time{font-size:11px;color:var(--muted)}
    .post-content{font-size:14px;color:var(--muted2);line-height:1.75;white-space:pre-wrap;word-break:break-word}
    .post-content a{color:var(--green)}
    .post-actions{display:flex;gap:10px;margin-top:10px}
    .post-action{font-size:12px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .15s;padding:0}
    .post-action:hover{color:var(--red)}

    /* Reply box */
    .reply-box{margin-top:28px}
    .reply-title{font-size:13px;font-weight:600;color:var(--muted2);margin-bottom:10px;letter-spacing:0.04em;text-transform:uppercase}
    .locked-notice{background:rgba(148,163,160,0.08);border:1px solid var(--border);border-radius:8px;padding:14px 16px;font-size:13px;color:var(--muted2);text-align:center}
    .neut-notice{background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.2);border-radius:8px;padding:14px 16px;font-size:13px;color:var(--muted2);text-align:center}
    textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:12px 14px;outline:none;transition:border-color .2s;resize:vertical;min-height:100px;line-height:1.6}
    textarea:focus{border-color:var(--green)}
    textarea::placeholder{color:var(--muted)}
    .reply-actions{display:flex;justify-content:flex-end;margin-top:10px}
    .reply-btn{padding:10px 20px;background:var(--green);border:none;border-radius:8px;color:#0b0f0e;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .2s}
    .reply-btn:hover{opacity:0.9}
    .reply-btn:disabled{opacity:0.4;cursor:not-allowed}
    .reply-err{font-size:12px;color:var(--red);margin-top:6px;display:none}
    .hint{font-size:11px;color:var(--muted);margin-top:6px}

    footer{text-align:center;padding:32px 0 0;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}
    @media(max-width:767px){.page{padding:20px 14px 60px}.topbar{padding:12px 16px}.post{grid-template-columns:36px 1fr;gap:10px}.post-avatar{width:36px;height:36px;font-size:13px}}

    footer{text-align:center;padding:24px 0 16px;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}
    @media(max-width:767px){footer{font-size:10px;padding:20px 8px 16px;white-space:nowrap;overflow-x:auto;display:flex;align-items:center;justify-content:center;flex-wrap:nowrap;gap:4px}}

    .msg-icon-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);text-decoration:none;color:var(--muted2);font-size:15px;transition:border-color .2s,color .2s;cursor:pointer}
    .msg-icon-btn:hover{border-color:var(--green);color:var(--green)}
    .msg-icon-badge{position:absolute;top:-5px;right:-5px;background:var(--red,#f87171);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:16px;text-align:center;display:none;line-height:1.4}
  
/* torchlight ambience */
body{position:relative}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(90% 38% at 50% -6%, rgba(52,211,153,.07), transparent 55%)}
.topbar,.page,.center,footer{position:relative;z-index:1}
.logo{text-shadow:0 0 10px rgba(52,211,153,.5)}
.page-title{text-shadow:0 0 16px rgba(52,211,153,.3)}
</style>
  <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet"/>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo" id="logoLink">⬡ Dungeon</a>
  <div class="nav">
    <a href="/forum.html">Forum</a>
    <a href="/dashboard.html">Dashboard</a>
    <button onclick="logout()">Sign out</button>
  </div>
</div>

<div class="page">
  <div class="breadcrumb" id="breadcrumb"><a href="/forum.html">Forum</a> › …</div>
  <div id="threadHeader"></div>
  <div class="divider"></div>
  <div id="postList"><div style="color:var(--muted);font-size:14px">Loading…</div></div>
  <div id="replyArea"></div>
</div>

<script>
  const threadId = new URLSearchParams(window.location.search).get('id');
  if(!threadId) window.location.href='/forum.html';

  const TIERS={neut:{label:'Neut',color:'#e2e8e4'},member:{label:'Member',color:'#60a5fa'},mod:{label:'Moderator',color:'#34d399'},admin:{label:'Admin',color:'#f87171'},warden:{label:'Dungeon Master',color:'#fbbf24'}};

  let myProfile = null;
  let threadData = null;

  fetch('/api/member/me').then(r=>r.json()).then(d=>{
    if(!d.authenticated){window.location.href='/login.html';return}
    myProfile = d.member?.profile;
    loadThread();
  });

  async function loadThread(){
    const res = await fetch(`/api/forum/threads/${threadId}`);
    if(!res.ok){window.location.href='/forum.html';return}
    const data = await res.json();
    threadData = data.thread;
    document.title = `Dungeon · ${threadData.title}`;
    renderHeader(threadData);
    renderPosts(data.posts);
    renderReplyBox(threadData);
  }

  function renderHeader(t){
    const isMod = myProfile && ['mod','admin','warden'].includes(myProfile.tier);
    const isAuthor = myProfile && myProfile.id === t.profile_id;
    document.getElementById('breadcrumb').innerHTML = `<a href="/forum.html">Forum</a> › <a href="/threads.html?cat=${t.category_id}">${t.category_name}</a>`;
    const modBar = isMod ? `
      <div class="mod-bar">
        <button class="mod-btn" onclick="togglePin()">${t.pinned?'Unpin':'📌 Pin'}</button>
        <button class="mod-btn" onclick="toggleLock()">${t.locked?'Unlock':'🔒 Lock'}</button>
        <button class="mod-btn danger" onclick="deleteThread()">Delete Thread</button>
      </div>` : '';
    document.getElementById('threadHeader').innerHTML = `
      <div class="thread-header">
        <div class="thread-badges">
          ${t.pinned?'<span class="badge badge-pin">📌 Pinned</span>':''}
          ${t.locked?'<span class="badge badge-lock">🔒 Locked</span>':''}
        </div>
        <div class="thread-title">${t.title}</div>
        <div class="thread-meta">by <a href="/profile.html?id=${t.profile_id}">@${t.screen_name}</a> &mdash; ${timeAgo(t.created_at)} &mdash; ${t.post_count} posts</div>
        ${modBar}
      </div>`;
  }

  function renderPosts(posts){
    const isMod = myProfile && ['mod','admin','warden'].includes(myProfile.tier);
    document.getElementById('postList').innerHTML = posts.map((p,i) => {
      const tier = TIERS[p.tier]||{label:p.tier,color:'#e2e8e4'};
      const isOwn = myProfile && myProfile.id === p.profile_id;
      const canDelete = isOwn || isMod;
      const initials = p.screen_name ? p.screen_name[0].toUpperCase() : '?';
      return `<div class="post" id="post-${p.id}">
        <div class="post-avatar" style="background:${p.avatar_color||'#60a5fa'}">
          ${p.avatar_url?`<img src="${p.avatar_url}" alt=""/>`:initials}
        </div>
        <div>
          <div class="post-author">
            <a href="/profile.html?id=${p.profile_id}" class="post-screenname">@${p.screen_name}</a>
            <span class="tier-badge" style="background:${tier.color}22;color:${tier.color}">
              <span class="tier-dot" style="background:${tier.color}"></span>${tier.label}
            </span>
            <span class="post-time">${timeAgo(p.created_at)}${p.edited_at?' (edited)':''}</span>
            ${i===0?'<span style="font-size:10px;color:var(--green);font-weight:600">OP</span>':''}
          </div>
          <div class="post-content">${escapeHtml(p.content)}</div>
          ${canDelete?`<div class="post-actions"><button class="post-action" onclick="deletePost('${p.id}')">Delete</button></div>`:''}
        </div>
      </div>`;
    }).join('');
  }

  function renderReplyBox(t){
    const area = document.getElementById('replyArea');
    if(!myProfile){area.innerHTML='';return}
    if(t.locked){
      area.innerHTML='<div class="reply-box"><div class="locked-notice">🔒 This thread is locked. No new replies.</div></div>';
      return;
    }
    if(myProfile.tier==='neut'){
      area.innerHTML='<div class="reply-box"><div class="neut-notice">Your application is pending. You can read but not reply yet.</div></div>';
      return;
    }
    area.innerHTML=`
      <div class="reply-box">
        <div class="reply-title">Post a Reply</div>
        <textarea id="replyContent" placeholder="Write your reply…"></textarea>
        <div class="hint">Plain text. Be respectful.</div>
        <div class="reply-err" id="replyErr"></div>
        <div class="reply-actions">
          <button class="reply-btn" id="replyBtn" onclick="submitReply()">Post Reply</button>
        </div>
      </div>`;
  }

  async function submitReply(){
    const content = document.getElementById('replyContent').value.trim();
    const btn = document.getElementById('replyBtn');
    const err = document.getElementById('replyErr');
    if(!content){err.textContent='Reply cannot be empty.';err.style.display='block';return}
    btn.disabled=true;btn.textContent='Posting…';err.style.display='none';
    const res = await fetch(`/api/forum/threads/${threadId}/posts`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content})});
    const data = await res.json();
    if(res.ok){
      document.getElementById('replyContent').value='';
      btn.disabled=false;btn.textContent='Post Reply';
      loadThread();
      // Scroll to bottom
      setTimeout(()=>window.scrollTo(0,document.body.scrollHeight),300);
    } else {
      err.textContent=data.error||'Something went wrong.';err.style.display='block';
      btn.disabled=false;btn.textContent='Post Reply';
    }
  }

  async function deletePost(id){
    if(!confirm('Delete this post?'))return;
    await fetch(`/api/forum/posts/${id}`,{method:'DELETE'});
    document.getElementById('post-'+id).remove();
  }

  async function togglePin(){
    const pinned = !threadData.pinned;
    await fetch(`/api/forum/threads/${threadId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({pinned})});
    loadThread();
  }

  async function toggleLock(){
    const locked = !threadData.locked;
    await fetch(`/api/forum/threads/${threadId}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({locked})});
    loadThread();
  }

  async function deleteThread(){
    if(!confirm('Delete this entire thread and all its posts?'))return;
    await fetch(`/api/forum/threads/${threadId}`,{method:'DELETE'});
    window.location.href=`/threads.html?cat=${threadData.category_id}`;
  }

  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function timeAgo(dt){
    // Force UTC parsing - SQLite stores datetimes without timezone suffix
    if(dt && !dt.endsWith('Z') && !dt.includes('+')) dt = dt.replace(' ','T') + 'Z';
    const s=Math.floor((Date.now()-new Date(dt))/1000);
    if(s<60)return 'just now';
    if(s<3600)return Math.floor(s/60)+'m ago';
    if(s<86400)return Math.floor(s/3600)+'h ago';
    if(s<604800)return Math.floor(s/86400)+'d ago';
    return new Date(dt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  }

  async function logout(){await fetch('/api/member/logout',{method:'POST'});window.location.href='/login.html'}


  // Dynamic footer links based on tier
  fetch('/api/member/me').then(r=>r.json()).then(d=>{
    if(!d.authenticated) return;
    const tier = d.member?.profile?.tier;
    const footer = document.getElementById('pageFooter');
    if(!footer) return;
    if(['mod','admin','warden'].includes(tier)){
      const span=document.createElement('span');
      span.style.whiteSpace='nowrap';
      let extra=' &nbsp;·&nbsp; <a href="/mod.html" style="color:var(--green)">Mod Panel</a>';
      if(['admin','warden'].includes(tier)){
        extra+=' &nbsp;·&nbsp; <a href="/admin.html" style="color:var(--red)">Dungeon Master</a>';
      }
      span.innerHTML=extra;
      footer.appendChild(span);
    } else if(['admin','warden'].includes(tier)){
      const span=document.createElement('span');
      span.innerHTML=' &nbsp;·&nbsp; <a href="/admin.html" style="color:var(--red)">Dungeon Master</a>';
      footer.appendChild(span);
    }
  }).catch(()=>{});

  // Message unread badge in topbar
  (function(){
    fetch('/api/messages/unread').then(r=>r.json()).then(d=>{
      const badge = document.getElementById('msgIconBadge');
      if(badge && d.count>0){badge.textContent=d.count;badge.style.display='block';}
    }).catch(()=>{});
  })();

  // Smart logo link - go to dashboard if logged in, home if not
  (function(){
    fetch('/api/member/me').then(r=>r.json()).then(d=>{
      const logo = document.getElementById('logoLink');
      if(logo && d.authenticated) logo.href = '/dashboard.html';
    }).catch(()=>{});
  })();
</script>

  <footer id="pageFooter">
    <a href="/dashboard.html">Dashboard</a><span class="sep"> · </span>
    <a href="/guides.html">Guides</a><span class="sep"> · </span>
    <a href="/forum.html">Forum</a><span class="sep"> · </span>
    <a href="/support.html">Support</a>
  </footer>
  <script src="/notif-bell.js"></script>
</body>
</html>
