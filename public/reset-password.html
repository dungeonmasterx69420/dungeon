<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Dungeon · Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c0b;--s1:#0e1412;--s2:#141c1a;--bdr:rgba(52,211,153,.1);--bdr2:rgba(52,211,153,.2);--g:#34d399;--txt:#dce8e3;--t2:#8fa89e;--t3:#4d6b62;--red:#f87171;--sans:'DM Sans',sans-serif}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:var(--sans);display:flex;align-items:center;justify-content:center;padding:20px}
.box{width:100%;max-width:400px}
.logo{font-family:'Press Start 2P','Minecraft',monospace;font-size:11px;color:var(--g);text-align:center;margin-bottom:32px;letter-spacing:.06em}
.card{background:var(--s1);border:1px solid var(--bdr2);border-radius:12px;padding:24px}
.title{font-size:17px;font-weight:700;margin-bottom:6px}
.sub{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.6}
.field{margin-bottom:14px}
.field label{display:block;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-bottom:5px}
.field input{width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:8px;color:var(--txt);font-family:var(--sans);font-size:14px;padding:11px 13px;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--g)}
.field input::placeholder{color:var(--t3)}
.btn{width:100%;padding:13px;background:var(--g);border:none;border-radius:8px;color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans);margin-top:4px;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.err{font-size:12px;color:var(--red);background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:8px;padding:10px 12px;margin-bottom:14px;display:none;line-height:1.5}
.ok{font-size:12px;color:var(--g);background:rgba(52,211,153,.08);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:14px;display:none;line-height:1.5}
.back{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--t3);text-decoration:none}
.back:hover{color:var(--t2)}
</style>
</head>
<body>
<div class="box">
  <div class="logo">⬡ Dungeon</div>

  <!-- Forgot password form -->
  <div class="card" id="card-forgot">
    <div class="title">Forgot Password</div>
    <div class="sub">Enter your email and we'll send you a reset link.</div>
    <div class="err" id="forgot-err"></div>
    <div class="ok" id="forgot-ok"></div>
    <div class="field" id="email-field">
      <label>Email Address</label>
      <input type="email" id="forgot-email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <button class="btn" id="forgot-btn" onclick="sendReset()">Send Reset Link</button>
    <a href="/login.html" class="back">← Back to Login</a>
  </div>

  <!-- Reset password form -->
  <div class="card" id="card-reset" style="display:none">
    <div class="title">Set New Password</div>
    <div class="sub">Choose a new password for your Dungeon account.</div>
    <div class="err" id="reset-err"></div>
    <div class="field">
      <label>New Password</label>
      <input type="password" id="reset-pw" placeholder="Min 6 characters"/>
    </div>
    <button class="btn" id="reset-btn" onclick="doReset()">Set New Password</button>
    <a href="/login.html" class="back">← Back to Login</a>
  </div>

  <!-- Done -->
  <div class="card" id="card-done" style="display:none">
    <div class="title" style="color:var(--g)">Password Updated</div>
    <div class="sub">Your password has been reset. You can now log in with your new password.</div>
    <a href="/login.html" class="btn" style="display:block;text-align:center;text-decoration:none;margin-top:8px">Go to Login →</a>
  </div>
</div>

<script>
let _token = null;

async function sendReset(){
  const email = document.getElementById('forgot-email').value.trim();
  const err = document.getElementById('forgot-err');
  const ok = document.getElementById('forgot-ok');
  err.style.display='none'; ok.style.display='none';
  if(!email){err.textContent='Email required';err.style.display='block';return;}
  const btn = document.getElementById('forgot-btn');
  btn.disabled=true; btn.textContent='Sending…';
  await fetch('/api/auth/forgot-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
  btn.disabled=false; btn.textContent='Send Reset Link';
  // Always show success to prevent email enumeration
  document.getElementById('email-field').style.display='none';
  btn.style.display='none';
  ok.textContent='If an account exists with that email, a reset link has been sent. Check your inbox.';
  ok.style.display='block';
}

async function doReset(){
  const pw = document.getElementById('reset-pw').value;
  const err = document.getElementById('reset-err');
  err.style.display='none';
  if(!pw||pw.length<6){err.textContent='Password must be at least 6 characters';err.style.display='block';return;}
  const btn = document.getElementById('reset-btn');
  btn.disabled=true; btn.textContent='Saving…';
  const r = await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:_token,new_password:pw})}).then(r=>r.json()).catch(e=>({error:e.message}));
  btn.disabled=false; btn.textContent='Set New Password';
  if(r.error){err.textContent=r.error;err.style.display='block';return;}
  document.getElementById('card-reset').style.display='none';
  document.getElementById('card-done').style.display='block';
}

// Check for token in URL
const token = new URLSearchParams(location.search).get('token');
if(token){
  _token = token;
  document.getElementById('card-forgot').style.display='none';
  document.getElementById('card-reset').style.display='block';
}
</script>
</body>
</html>
