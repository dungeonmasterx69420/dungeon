<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Dungeon · Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0f0e;--surface:#111915;--surface2:#172118;
      --border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.25);
      --green:#34d399;--green-bg:rgba(52,211,153,0.08);--green-bg2:rgba(52,211,153,0.15);
      --text:#e2e8e4;--muted:#6b8f7a;--muted2:#94a3a0;--red:#f87171;
    }
    html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--green);letter-spacing:0.12em;text-decoration:none}
    .center{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px 32px;width:100%;max-width:380px}
    .card-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
    .card-sub{font-size:13px;color:var(--muted2);margin-bottom:28px}
    .field{margin-bottom:18px}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted2);margin-bottom:7px;letter-spacing:0.04em;text-transform:uppercase}
    input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s}
    input:focus{border-color:var(--green)}
    input::placeholder{color:var(--muted)}
    .btn{width:100%;margin-top:8px;padding:12px;background:var(--green);border:none;border-radius:8px;color:#0b0f0e;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
    .btn:hover{opacity:0.9}
    .btn:disabled{opacity:0.4;cursor:not-allowed}
    .error-msg{display:none;margin-top:14px;font-size:13px;color:var(--red);text-align:center}
    @media(max-width:767px){.card{padding:28px 20px}}

    footer{text-align:center;padding:32px 0 0;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo">Dungeon</a>
</div>
<div class="center">
  <div class="card">
    <div class="card-title">Member Sign In</div>
    <div class="card-sub">Sign in with your Stremio credentials.</div>
    <div class="field">
      <label>Stremio Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Sign In</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>
<script>
  fetch('/api/member/me').then(r=>r.json()).then(d=>{if(d.authenticated)window.location.href='/dashboard.html'});
  async function login(){
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value.trim();
    const btn=document.getElementById('loginBtn');
    const err=document.getElementById('errorMsg');
    if(!email||!password){err.textContent='Both fields are required.';err.style.display='block';return}
    btn.disabled=true;btn.textContent='Signing in…';err.style.display='none';
    try{
      const res=await fetch('/api/member/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data=await res.json();
      if(res.ok){window.location.href='/dashboard.html'}
      else{err.textContent=data.error||'Incorrect email or password.';err.style.display='block';btn.disabled=false;btn.textContent='Sign In'}
    }catch{err.textContent='Connection error. Please try again.';err.style.display='block';btn.disabled=false;btn.textContent='Sign In'}
  }
</script>

  <footer>
    <a href="/dashboard.html">Members</a>
    &nbsp;·&nbsp;
    <a href="/admin.html">Warden</a>
  </footer>
</body>
</html>
