<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Dungeon · Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0f0e;--surface:#111915;--surface2:#172118;
      --border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.25);
      --green:#34d399;--green-bg:rgba(52,211,153,0.08);--green-bg2:rgba(52,211,153,0.15);
      --text:#e2e8e4;--muted:#6b8f7a;--muted2:#94a3a0;--red:#f87171;
    }
    html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Press Start 2P','Minecraft',monospace !important;font-size:11px !important;font-weight:400 !important;color:var(--green);letter-spacing:0.04em;text-decoration:none}
    .center{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 24px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:36px 32px;width:100%;max-width:380px}
    .card-title{font-size:18px;font-weight:600;color:var(--text);margin-bottom:6px}
    .card-sub{font-size:13px;color:var(--muted2);margin-bottom:28px}
    .field{margin-bottom:18px}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted2);margin-bottom:7px;letter-spacing:0.04em;text-transform:uppercase}
    input{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s}
    input:focus{border-color:var(--green)}
    input::placeholder{color:var(--muted)}
    .btn{width:100%;margin-top:8px;padding:12px;background:var(--green);border:none;border-radius:8px;color:#0b0f0e;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
    .btn:hover{opacity:0.9}
    .btn:disabled{opacity:0.4;cursor:not-allowed}
    .error-msg{display:none;margin-top:14px;font-size:13px;color:var(--red);text-align:center}
    @media(max-width:767px){.card{padding:28px 20px}}

    footer{text-align:center;padding:32px 0 0;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}

    footer{text-align:center;padding:24px 0 16px;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}
    @media(max-width:767px){footer{font-size:10px;padding:20px 8px 16px;white-space:nowrap;overflow-x:auto;display:flex;align-items:center;justify-content:center;flex-wrap:nowrap;gap:4px}}

    .msg-icon-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);text-decoration:none;color:var(--muted2);font-size:15px;transition:border-color .2s,color .2s;cursor:pointer}
    .msg-icon-btn:hover{border-color:var(--green);color:var(--green)}
    .msg-icon-badge{position:absolute;top:-5px;right:-5px;background:var(--red,#f87171);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:16px;text-align:center;display:none;line-height:1.4}
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet"/>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo" id="logoLink">Dungeon</a>
</div>
<div class="center">
  <div class="card">
    <div class="card-title">Member Sign In</div>
    
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
    </div>
    <button class="btn" id="loginBtn" onclick="login()">Sign In</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>
</div>
<script>
  fetch('/api/member/me').then(r=>r.json()).then(d=>{if(d.authenticated)window.location.href='/dashboard.html'});
  async function login(){
    const email=document.getElementById('email').value.trim();
    const password=document.getElementById('password').value.trim();
    const btn=document.getElementById('loginBtn');
    const err=document.getElementById('errorMsg');
    if(!email||!password){err.textContent='Both fields are required.';err.style.display='block';return}
    btn.disabled=true;btn.textContent='Signing in…';err.style.display='none';
    try{
      const res=await fetch('/api/member/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
      const data=await res.json();
      if(res.ok){window.location.href='/dashboard.html'}
      else{
        err.textContent=data.error||'Incorrect email or password.';
        err.style.display='block';
        btn.disabled=false;
        btn.textContent='Sign In';
        // If locked out, disable form temporarily
        if(data.error && data.error.includes('locked')) {
          btn.disabled=true;
          btn.textContent='Locked — try again in 5 min';
          setTimeout(()=>{btn.disabled=false;btn.textContent='Sign In';err.style.display='none';},5*60*1000);
        }
      }
    }catch{err.textContent='Connection error. Please try again.';err.style.display='block';btn.disabled=false;btn.textContent='Sign In'}
  }


  // Dynamic footer links based on tier
  fetch('/api/member/me').then(r=>r.json()).then(d=>{
    if(!d.authenticated) return;
    const tier = d.member?.profile?.tier;
    const footer = document.getElementById('pageFooter');
    if(!footer) return;
    if(['mod','admin','warden'].includes(tier)){
      const span=document.createElement('span');
      span.style.whiteSpace='nowrap';
      let extra=' &nbsp;·&nbsp; <a href="/mod.html" style="color:var(--green)">Mod Panel</a>';
      if(['admin','warden'].includes(tier)){
        extra+=' &nbsp;·&nbsp; <a href="/admin.html" style="color:var(--red)">Dungeon Master</a>';
      }
      span.innerHTML=extra;
      footer.appendChild(span);
    } else if(['admin','warden'].includes(tier)){
      const span=document.createElement('span');
      span.innerHTML=' &nbsp;·&nbsp; <a href="/admin.html" style="color:var(--red)">Dungeon Master</a>';
      footer.appendChild(span);
    }
  }).catch(()=>{});

  // Message unread badge in topbar
  (function(){
    fetch('/api/messages/unread').then(r=>r.json()).then(d=>{
      const badge = document.getElementById('msgIconBadge');
      if(badge && d.count>0){badge.textContent=d.count;badge.style.display='block';}
    }).catch(()=>{});
  })();

  // Smart logo link — go to dashboard if logged in, home if not
  (function(){
    fetch('/api/member/me').then(r=>r.json()).then(d=>{
      const logo = document.getElementById('logoLink');
      if(logo && d.authenticated) logo.href = '/dashboard.html';
    }).catch(()=>{});
  })();
</script>


  <footer id="pageFooter">
    <a href="/profile.html">My Profile</a>
    &nbsp;·&nbsp;
    <a href="/directory.html">Directory</a>
    &nbsp;·&nbsp;
    <a href="/forum.html">Forum</a>
    &nbsp;·&nbsp;
    <a href="/dashboard.html">Dashboard</a>
  </footer>
</body>
</html>
