<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Dungeon</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0b0f0e;--surface:#111915;--border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.25);
      --green:#34d399;--green-bg:rgba(52,211,153,0.08);--text:#e2e8e4;--muted:#6b8f7a;--muted2:#94a3a0;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
    body{display:flex;flex-direction:column;min-height:100vh}

    .topbar{
      background:var(--surface);border-bottom:1px solid var(--border);
      padding:16px 28px;display:flex;align-items:center;justify-content:space-between;
    }
    .logo{font-family:'Press Start 2P','Minecraft',monospace !important;font-size:11px !important;font-weight:400 !important;color:var(--green);letter-spacing:0.04em;text-decoration:none;line-height:1.4}
    .warden-link{font-size:13px;color:var(--muted);text-decoration:none;font-weight:500;transition:color .2s}
    .warden-link:hover{color:var(--text)}


    .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}

    .tagline{font-family:'Press Start 2P','Minecraft',monospace !important;font-size:9px !important;font-weight:400 !important;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:32px;line-height:1.6}

    .seek-btn{font-family:'Press Start 2P','Minecraft',monospace !important;
      display:inline-block;padding:14px 48px;
      background:var(--green-bg);border:1px solid var(--green);border-radius:8px;
      color:var(--green);font-family:'Inter',sans-serif;font-size:15px;font-weight:600;
      letter-spacing:0.06em;text-decoration:none;text-transform:uppercase;
      transition:background .2s,color .2s;
    }
    .seek-btn:hover{background:var(--green);color:#0b0f0e}

    @media(max-width:767px){
      .topbar{padding:14px 20px}
    }
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet"/>
</head>
<body>

<div class="topbar">
  <a href="/" class="logo" id="logoLink">Dungeon</a>
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/admin.html" class="warden-link">Dungeon Master</a>
    <a href="/dashboard.html" class="warden-link">Dashboard</a>
  </div>
</div>

<div class="center">
  <div class="tagline">Members Only</div>
  <a href="/apply.html" class="seek-btn">Apply</a>
</div>
