<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>DUNGEON</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:  #1a1a1a;
      --red2:   #b22222;
      --red3:   #cc3333;
      --bone:   #d4c4a8;
      --bone2:  #e8dcc8;
      --dim:    #7a6a58;
      --dimmer: #3a2a20;
      --line:   rgba(180,50,50,0.2);
      --line2:  rgba(180,50,50,0.4);
    }

    html, body {
      height: 100%;
      background: var(--black);
      color: var(--bone);
      font-family: 'Cinzel', Georgia, serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* Subtle vignette */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 100% 100% at 50% 50%, transparent 50%, rgba(0,0,0,0.55) 100%);
      pointer-events: none; z-index: 0;
    }

    /* Warden link */
    .nav-link {
      position: fixed; top: 24px; right: 28px;
      font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--dimmer); text-decoration: none;
      transition: color 0.2s; z-index: 10;
    }
    .nav-link:hover { color: var(--red3); }

    /* Top-left header */
    .site-header {
      position: relative; z-index: 10;
      padding: 24px 28px;
      display: flex; align-items: center;
    }

    /* Center content */
    .center {
      position: relative; z-index: 1;
      text-align: center;
      padding: 0 32px;
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* Title — top left, small */
    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--red3);
      line-height: 1;
      user-select: none;
    }

    /* Gold rule */
    .rule {
      width: 100%;
      max-width: 480px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--red2), transparent);
      margin: 0 auto 48px;
    }

    /* Two paths */
    .paths {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .path-link {
      font-size: 13px;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--dim);
      text-decoration: none;
      padding: 14px 0;
      width: 240px;
      text-align: center;
      border: 1px solid transparent;
      transition: all 0.25s;
      display: block;
    }

    .path-link.primary {
      border-color: var(--red2);
      color: var(--red3);
    }

    .path-link.primary:hover {
      background: rgba(178,34,34,0.1);
      color: var(--bone2);
      border-color: var(--red3);
    }

    .path-link.secondary {
      border-color: var(--dimmer);
      color: var(--dim);
    }

    .path-link.secondary:hover {
      border-color: var(--dim);
      color: var(--bone);
    }

    /* Divider between paths */
    .path-or {
      font-size: 9px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--dimmer);
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    footer p {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dimmer);
    }

    footer a {
      color: var(--dimmer);
      text-decoration: none;
    }

    footer a:hover { color: var(--red3); }

    /* Torch */
    .torch-link {
      display: inline-block; vertical-align: middle;
      margin-left: 8px; opacity: 0.3;
      transition: opacity 0.3s; cursor: pointer; line-height: 0;
    }
    .torch-link:hover { opacity: 0.9; }
    #torchCanvas { image-rendering: pixelated; display: block; }

    /* Corner gif — desktop only */
    .corner-gif {
      position: fixed; bottom: 16px; right: 16px;
      width: 88px; height: 88px;
      object-fit: contain; image-rendering: pixelated;
      z-index: 50; pointer-events: none; opacity: 0.85;
    }

    @media (max-width: 767px) {
      .corner-gif { display: none; }
      .site-header { padding: 20px 20px; }
      .title { font-size: 18px; }
      .path-link { width: 180px; font-size: 12px; letter-spacing: 0.35em; padding: 12px 0; }
    }
  </style>
</head>
<body>

<img class="corner-gif" src="https://c.tenor.com/sbNfkG-ioMwAAAAd/tenor.gif" alt="" />
<a href="/admin.html" class="nav-link">Warden ↗</a>

<div class="site-header">
  <div class="title">Dungeon</div>
</div>

<div class="center">
  <a href="/apply.html" class="path-link primary">Seek Entry</a>
</div>

<footer>
  <p>
    <a href="/admin.html">Warden's Gate</a>
    <a href="/login.html" class="torch-link" title=""><canvas id="torchCanvas" width="14" height="20"></canvas></a>
  </p>
</footer>

<script>
  // Pixel torch
  (function() {
    const canvas = document.getElementById('torchCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const S = 2;
    const C = { _:null, B:'#5a3010', K:'#3a1a08', O:'#d05010', Y:'#f0b020', r:'#b83010', o:'#e07020' };
    const frames = [
      ['__YY___','_YYoY__','_YOrO__','__rO___','___B___','___B___','___B___','__BBB__','___B___','___K___'],
      ['___Y___','__YOY__','_YOrO__','_OYr___','___B___','___B___','___B___','__BBB__','___B___','___K___'],
      ['__YY___','_oYY___','__OrY__','__rO___','___B___','___B___','___B___','__BBB__','___B___','___K___'],
    ];
    let frame = 0, tick = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      frames[frame % frames.length].forEach((row, ry) => {
        [...row].forEach((ch, rx) => { const c = C[ch]; if (c) { ctx.fillStyle = c; ctx.fillRect(rx*S, ry*S, S, S); } });
      });
    }
    (function loop() { tick++; if (tick % 6 === 0) frame++; draw(); requestAnimationFrame(loop); })();
  })();
</script>
</body>
</html>
