<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Dungeon · Threads</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060908;--surface:#141c19;--surface2:#0d1311;--border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.28);--green:#34d399;--green-bg:rgba(52,211,153,0.08);--text:#dce8e3;--muted:#6f8f84;--muted2:#8fa89e;--red:#f87171;--amber:#fbbf24}
    html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .logo{font-family:'Press Start 2P','Minecraft',monospace !important;font-size:11px !important;font-weight:400 !important;color:var(--green);letter-spacing:0.04em;text-decoration:none}
    .nav{display:flex;align-items:center;gap:20px}
    .nav a,.nav button{font-size:13px;color:var(--muted);text-decoration:none;font-weight:500;background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:color .2s}
    .nav a:hover,.nav button:hover{color:var(--text)}
    .page{max-width:860px;margin:0 auto;padding:32px 24px 80px}
    .breadcrumb{font-size:13px;color:var(--muted);margin-bottom:20px}
    .breadcrumb a{color:var(--green);text-decoration:none}
    .breadcrumb a:hover{text-decoration:underline}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
    .page-title{font-family:'Press Start 2P','Minecraft',monospace;font-size:10px;font-weight:400;color:var(--text);line-height:1.6}
    .page-desc{font-size:14px;color:var(--muted2);margin-bottom:24px}
    .new-btn{padding:9px 18px;background:var(--green);border:none;border-radius:8px;color:#0b0f0e;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:opacity .2s;display:inline-block;white-space:nowrap}
    .new-btn:hover{opacity:0.9}
    .new-btn:disabled{opacity:0.4;cursor:not-allowed}
    .divider{height:1px;background:var(--border);margin-bottom:0}

    /* Thread rows */
    .thread-row{border-bottom:1px solid var(--border);padding:16px 0;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;text-decoration:none;color:inherit;transition:background .15s;cursor:pointer}
    .thread-row:last-child{border-bottom:none}
    .thread-row:hover{background:rgba(52,211,153,0.03);border-radius:6px;padding-left:6px;padding-right:6px}
    .thread-badges{display:flex;gap:6px;margin-bottom:6px}
    .badge-pin{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:rgba(52,211,153,0.12);color:var(--green)}
    .badge-lock{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;background:rgba(148,163,160,0.12);color:var(--muted2)}
    .thread-title{font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;line-height:1.4}
    .thread-meta{font-size:12px;color:var(--muted)}
    .thread-meta a{color:var(--green);text-decoration:none}
    .thread-meta a:hover{text-decoration:underline}
    .thread-stats{text-align:right}
    .thread-replies{font-size:16px;font-weight:600;color:var(--text)}
    .thread-replies-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
    .thread-last{font-size:11px;color:var(--muted);margin-top:4px}
    .empty{text-align:center;padding:48px 0;color:var(--muted)}

    footer{text-align:center;padding:32px 0 0;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}
    @media(max-width:767px){.page{padding:20px 14px 60px}.topbar{padding:12px 16px}.thread-stats{display:none}}

    footer{text-align:center;padding:24px 0 16px;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}
    @media(max-width:767px){footer{font-size:10px;padding:20px 8px 16px;white-space:nowrap;overflow-x:auto;display:flex;align-items:center;justify-content:center;flex-wrap:nowrap;gap:4px}}

    .msg-icon-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);text-decoration:none;color:var(--muted2);font-size:15px;transition:border-color .2s,color .2s;cursor:pointer}
    .msg-icon-btn:hover{border-color:var(--green);color:var(--green)}
    .msg-icon-badge{position:absolute;top:-5px;right:-5px;background:var(--red,#f87171);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:16px;text-align:center;display:none;line-height:1.4}
  
/* torchlight ambience */
body{position:relative}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(90% 38% at 50% -6%, rgba(52,211,153,.07), transparent 55%)}
.topbar,.page,.center,footer{position:relative;z-index:1}
.logo{text-shadow:0 0 10px rgba(52,211,153,.5)}
.page-title{text-shadow:0 0 16px rgba(52,211,153,.3)}
</style>
  <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet"/>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo" id="logoLink">⬡ Dungeon</a>
  <div class="nav">
    <a href="/forum.html">Forum</a>
    <a href="/dashboard.html">Dashboard</a>
    <button onclick="logout()">Sign out</button>
  </div>
</div>

<div class="page">
  <div class="breadcrumb"><a href="/forum.html">Forum</a> › <span id="catName">…</span></div>
  <div class="page-header">
    <div class="page-title" id="pageTitle">…</div>
    <a href="#" class="new-btn" id="newBtn">+ New Thread</a>
  </div>
  <div class="page-desc" id="pageDesc"></div>
  <div class="divider"></div>
  <div id="threadList"><div style="color:var(--muted);font-size:14px;padding:24px 0">Loading…</div></div>
</div>

<script>
  const catId = new URLSearchParams(window.location.search).get('cat');
  if (!catId) window.location.href = '/forum.html';

  let myProfile = null;
  let isRestricted = false;

  fetch('/api/member/me').then(r=>r.json()).then(d=>{
    if(!d.authenticated){window.location.href='/login.html';return}
    myProfile = d.member?.profile;
    loadCategory();
    loadThreads();
  });

  async function loadCategory(){
    const cats = await fetch('/api/forum/categories').then(r=>r.json());
    const cat = cats.find(c=>c.id===catId);
    if(!cat){window.location.href='/forum.html';return}
    document.title = `Dungeon · ${cat.name}`;
    document.getElementById('catName').textContent = cat.name;
    document.getElementById('pageTitle').textContent = cat.name;
    document.getElementById('pageDesc').textContent = cat.description||'';
    isRestricted = !!cat.restricted;
    const btn = document.getElementById('newBtn');
    btn.href = `/new-thread.html?cat=${catId}`;
    // Disable new thread for restricted categories unless warden/admin
    if(isRestricted && myProfile && !['warden','admin'].includes(myProfile.tier)){
      btn.style.opacity='0.3';
      btn.style.pointerEvents='none';
      btn.title='Only the Dungeon Master can post in Announcements';
    }
  }

  async function loadThreads(){
    const threads = await fetch(`/api/forum/categories/${catId}/threads`).then(r=>r.json());
    const el = document.getElementById('threadList');
    if(!threads.length){el.innerHTML='<div class="empty">No threads yet. Be the first to post.</div>';return}
    el.innerHTML = threads.map(t=>`
      <div class="thread-row" onclick="window.location.href='/thread.html?id=${t.id}'">
        <div>
          <div class="thread-badges">
            ${t.pinned?'<span class="badge-pin">📌 Pinned</span>':''}
            ${t.locked?'<span class="badge-lock">🔒 Locked</span>':''}
          </div>
          <div class="thread-title">${t.title}</div>
          <div class="thread-meta">by <a href="/profile.html?id=${t.profile_id}" onclick="event.stopPropagation()">@${t.screen_name}</a> &mdash; ${timeAgo(t.created_at)}</div>
        </div>
        <div class="thread-stats">
          <div class="thread-replies">${t.reply_count}</div>
          <div class="thread-replies-label">replies</div>
          ${t.last_poster?`<div class="thread-last">Last: @${t.last_poster}</div>`:''}
        </div>
      </div>`).join('');
  }

  function timeAgo(dt){
    if(dt && !dt.endsWith('Z') && !dt.includes('+')) dt = dt.replace(' ','T') + 'Z';
    const s=Math.floor((Date.now()-new Date(dt))/1000);
    if(s<60)return 'just now';
    if(s<3600)return Math.floor(s/60)+'m ago';
    if(s<86400)return Math.floor(s/3600)+'h ago';
    if(s<604800)return Math.floor(s/86400)+'d ago';
    return new Date(dt).toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  async function logout(){await fetch('/api/member/logout',{method:'POST'});window.location.href='/login.html'}


  // Dynamic footer links based on tier
  fetch('/api/member/me').then(r=>r.json()).then(d=>{
    if(!d.authenticated) return;
    const tier = d.member?.profile?.tier;
    const footer = document.getElementById('pageFooter');
    if(!footer) return;
    if(['mod','admin','warden'].includes(tier)){
      const span=document.createElement('span');
      span.style.whiteSpace='nowrap';
      let extra=' &nbsp;·&nbsp; <a href="/mod.html" style="color:var(--green)">Mod Panel</a>';
      if(['admin','warden'].includes(tier)){
        extra+=' &nbsp;·&nbsp; <a href="/admin.html" style="color:var(--red)">Dungeon Master</a>';
      }
      span.innerHTML=extra;
      footer.appendChild(span);
    } else if(['admin','warden'].includes(tier)){
      const span=document.createElement('span');
      span.innerHTML=' &nbsp;·&nbsp; <a href="/admin.html" style="color:var(--red)">Dungeon Master</a>';
      footer.appendChild(span);
    }
  }).catch(()=>{});

  // Message unread badge in topbar
  (function(){
    fetch('/api/messages/unread').then(r=>r.json()).then(d=>{
      const badge = document.getElementById('msgIconBadge');
      if(badge && d.count>0){badge.textContent=d.count;badge.style.display='block';}
    }).catch(()=>{});
  })();

  // Smart logo link — go to dashboard if logged in, home if not
  (function(){
    fetch('/api/member/me').then(r=>r.json()).then(d=>{
      const logo = document.getElementById('logoLink');
      if(logo && d.authenticated) logo.href = '/dashboard.html';
    }).catch(()=>{});
  })();
</script>

  <footer id="pageFooter">
    <a href="/profile.html">My Profile</a>
    &nbsp;·&nbsp;
    <a href="/forum.html">Forum</a>
    &nbsp;·&nbsp;
    <a href="/dashboard.html">Dashboard</a>
  </footer>
</body>
</html>
