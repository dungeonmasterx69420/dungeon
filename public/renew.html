<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <meta charset="UTF-8"/>
  <meta name="color-scheme" content="dark"/>
<meta name="theme-color" content="#060908"/>
<link rel="manifest" href="/site.webmanifest"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Dungeon · Renew</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=block');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#060908;--surface:#141c19;--surface2:#0d1311;--border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.28);--green:#34d399;--green-bg:rgba(52,211,153,0.08);--text:#dce8e3;--muted:#6f8f84;--muted2:#8fa89e;--red:#f87171}
    html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Press Start 2P','Minecraft',monospace !important;font-size:11px !important;font-weight:400 !important;color:var(--green);letter-spacing:0.04em;text-decoration:none}
    .back-link{font-size:13px;color:var(--muted);text-decoration:none;font-weight:500;transition:color .2s}
    .back-link:hover{color:var(--text)}
    .page{max-width:520px;margin:0 auto;padding:40px 24px 80px}
    .page-title{font-family:'Press Start 2P','Minecraft',monospace !important;font-size:10px !important;font-weight:400 !important;color:var(--text);margin-bottom:16px;line-height:1.6}
    .page-sub{font-size:14px;color:var(--muted2);margin-bottom:32px;line-height:1.6}
    .divider{height:1px;background:var(--border);margin-bottom:24px}
    .field{margin-bottom:16px}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted2);margin-bottom:7px;letter-spacing:0.04em;text-transform:uppercase}
    textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s;resize:none;height:100px;line-height:1.6}
    textarea:focus{border-color:var(--green)}
    textarea::placeholder{color:var(--muted)}
    .error-banner{display:none;font-size:13px;color:var(--red);margin-bottom:16px;padding:12px 14px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:8px}
    .btn{width:100%;padding:13px;background:var(--green);border:none;border-radius:8px;color:#0b0f0e;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px}
    .btn:hover{opacity:0.9}
    .btn:disabled{opacity:0.4;cursor:not-allowed}
    #successPage{display:none;text-align:center;padding:60px 0}
    .success-icon{font-size:48px;margin-bottom:20px}
    .success-title{font-size:22px;font-weight:600;color:var(--text);margin-bottom:10px}
    .success-sub{font-size:14px;color:var(--muted2);line-height:1.7;margin-bottom:28px}
    .dash-link{display:inline-block;padding:10px 24px;border:1px solid var(--border2);border-radius:8px;color:var(--muted2);font-size:13px;font-weight:500;text-decoration:none;transition:border-color .2s,color .2s}
    .dash-link:hover{border-color:var(--green);color:var(--green)}
    @media(max-width:767px){.page{padding:28px 16px 60px}}

    footer{text-align:center;padding:32px 0 0;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}

    footer{text-align:center;padding:24px 0 16px;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}
    @media(max-width:767px){footer{font-size:10px;padding:20px 8px 16px;white-space:nowrap;overflow-x:auto;display:flex;align-items:center;justify-content:center;flex-wrap:nowrap;gap:4px}}

    .msg-icon-btn{position:relative;display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);text-decoration:none;color:var(--muted2);font-size:15px;transition:border-color .2s,color .2s;cursor:pointer}
    .msg-icon-btn:hover{border-color:var(--green);color:var(--green)}
    .msg-icon-badge{position:absolute;top:-5px;right:-5px;background:var(--red,#f87171);color:#fff;font-size:9px;font-weight:700;padding:1px 4px;border-radius:8px;min-width:16px;text-align:center;display:none;line-height:1.4}
  
/* torchlight ambience */
body{position:relative}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(90% 38% at 50% -6%, rgba(52,211,153,.07), transparent 55%)}
.topbar,.page,.center,footer{position:relative;z-index:1}
.logo{text-shadow:0 0 10px rgba(52,211,153,.5)}
.page-title{text-shadow:0 0 16px rgba(52,211,153,.3)}
</style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet"/>
<style>/* unified header logo */.logo{font-family:'Press Start 2P',monospace!important;font-size:11px!important;font-weight:400!important;letter-spacing:.04em!important;color:#34d399!important;text-decoration:none!important;text-shadow:0 0 10px rgba(52,211,153,.5)!important;line-height:1.4!important}.logo svg{width:12px;height:12px;margin-right:7px;vertical-align:-1px;fill:none;stroke:currentColor;stroke-width:2.2;filter:drop-shadow(0 0 5px rgba(52,211,153,.5))}</style>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo" id="logoLink"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2.2 20.5 7.1v9.8L12 21.8 3.5 16.9V7.1Z"/></svg>DUNGEON</a>
</div>
<div class="page">
  <div class="page-title">Request Renewal</div>
  <div class="page-sub">Submit a renewal request and the Dungeon Master will extend your access for another month.</div>
  <div class="divider"></div>
  <div id="formPage">
    <div class="error-banner" id="errorBanner"></div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="notes" placeholder="Anything you'd like to include…"></textarea>
    </div>
    <div class="divider"></div>
    <button class="btn" id="submitBtn" onclick="submitRenewal()">Submit Renewal Request</button>
  </div>
  <div id="successPage">
    <div class="success-icon">✅</div>
    <div class="success-title">Renewal Requested</div>
    <div class="success-sub">Your request has been received. The Dungeon Master will extend your access shortly.</div>
    <a href="/dashboard.html" class="dash-link">Back to Dashboard</a>
  </div>
</div>
<script>
  fetch('/api/member/me').then(r=>r.json()).then(d=>{if(!d.authenticated)window.location.href='/login.html'});
  async function submitRenewal(){
    const btn=document.getElementById('submitBtn'),banner=document.getElementById('errorBanner');
    btn.disabled=true;btn.textContent='Submitting…';banner.style.display='none';
    try{
      const res=await fetch('/api/member/renew',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:document.getElementById('notes').value.trim()})});
      const data=await res.json();
      if(res.ok){document.getElementById('formPage').style.display='none';document.getElementById('successPage').style.display='block'}
      else{banner.textContent=data.error||'Something went wrong.';banner.style.display='block';btn.disabled=false;btn.textContent='Submit Renewal Request'}
    }catch{banner.textContent='Connection error. Please try again.';banner.style.display='block';btn.disabled=false;btn.textContent='Submit Renewal Request'}
  }


  // Dynamic footer links based on tier
  fetch('/api/member/me').then(r=>r.json()).then(d=>{
    if(!d.authenticated) return;
    const tier = d.member?.profile?.tier;
    const footer = document.getElementById('pageFooter');
    if(!footer) return;
    if(['mod','admin','warden'].includes(tier)){
      const span=document.createElement('span');
      span.style.whiteSpace='nowrap';
      let extra=' &nbsp;·&nbsp; <a href="/mod.html" style="color:var(--green)">Mod Panel</a>';
      if(['admin','warden'].includes(tier)){
        extra+=' &nbsp;·&nbsp; <a href="/admin.html" style="color:var(--red)">Dungeon Master</a>';
      }
      span.innerHTML=extra;
      footer.appendChild(span);
    } else if(['admin','warden'].includes(tier)){
      const span=document.createElement('span');
      span.innerHTML=' &nbsp;·&nbsp; <a href="/admin.html" style="color:var(--red)">Dungeon Master</a>';
      footer.appendChild(span);
    }
  }).catch(()=>{});

  // Message unread badge in topbar
  (function(){
    fetch('/api/messages/unread').then(r=>r.json()).then(d=>{
      const badge = document.getElementById('msgIconBadge');
      if(badge && d.count>0){badge.textContent=d.count;badge.style.display='block';}
    }).catch(()=>{});
  })();

  // Smart logo link - go to dashboard if logged in, home if not
  (function(){
    fetch('/api/member/me').then(r=>r.json()).then(d=>{
      const logo = document.getElementById('logoLink');
      if(logo && d.authenticated) logo.href = '/dashboard.html';
    }).catch(()=>{});
  })();
</script>


  <footer id="pageFooter">
    <a href="/dashboard.html">Dashboard</a><span class="sep"> · </span>
    <a href="/guides.html">Guides</a><span class="sep"> · </span>
    <a href="/forum.html">Forum</a><span class="sep"> · </span>
    <a href="/support.html">Support</a>
  </footer>
  <script src="/notif-bell.js"></script>
</body>
</html>
