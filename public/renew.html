<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Dungeon · Renew</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0b0f0e;--surface:#111915;--surface2:#172118;--border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.25);--green:#34d399;--green-bg:rgba(52,211,153,0.08);--text:#e2e8e4;--muted:#6b8f7a;--muted2:#94a3a0;--red:#f87171}
    html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
    .logo{font-family:'Press Start 2P','Minecraft',monospace;font-size:11px;font-weight:400;color:var(--green);letter-spacing:0.04em;text-decoration:none}
    .back-link{font-size:13px;color:var(--muted);text-decoration:none;font-weight:500;transition:color .2s}
    .back-link:hover{color:var(--text)}
    .page{max-width:520px;margin:0 auto;padding:40px 24px 80px}
    .page-title{font-family:'Press Start 2P','Minecraft',monospace;font-size:10px;font-weight:400;color:var(--text);margin-bottom:16px;line-height:1.6}
    .page-sub{font-size:14px;color:var(--muted2);margin-bottom:32px;line-height:1.6}
    .divider{height:1px;background:var(--border);margin-bottom:24px}
    .field{margin-bottom:16px}
    label{display:block;font-size:12px;font-weight:600;color:var(--muted2);margin-bottom:7px;letter-spacing:0.04em;text-transform:uppercase}
    textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:10px 14px;outline:none;transition:border-color .2s;resize:none;height:100px;line-height:1.6}
    textarea:focus{border-color:var(--green)}
    textarea::placeholder{color:var(--muted)}
    .error-banner{display:none;font-size:13px;color:var(--red);margin-bottom:16px;padding:12px 14px;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:8px}
    .btn{width:100%;padding:13px;background:var(--green);border:none;border-radius:8px;color:#0b0f0e;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s;margin-top:8px}
    .btn:hover{opacity:0.9}
    .btn:disabled{opacity:0.4;cursor:not-allowed}
    #successPage{display:none;text-align:center;padding:60px 0}
    .success-icon{font-size:48px;margin-bottom:20px}
    .success-title{font-size:22px;font-weight:600;color:var(--text);margin-bottom:10px}
    .success-sub{font-size:14px;color:var(--muted2);line-height:1.7;margin-bottom:28px}
    .dash-link{display:inline-block;padding:10px 24px;border:1px solid var(--border2);border-radius:8px;color:var(--muted2);font-size:13px;font-weight:500;text-decoration:none;transition:border-color .2s,color .2s}
    .dash-link:hover{border-color:var(--green);color:var(--green)}
    @media(max-width:767px){.page{padding:28px 16px 60px}}

    footer{text-align:center;padding:32px 0 0;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}
  </style>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet"/>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo">Dungeon</a>
</div>
<div class="page">
  <div class="page-title">Request Renewal</div>
  <div class="page-sub">Submit a renewal request and the Warden will extend your access for another month.</div>
  <div class="divider"></div>
  <div id="formPage">
    <div class="error-banner" id="errorBanner"></div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="notes" placeholder="Anything you'd like to include…"></textarea>
    </div>
    <div class="divider"></div>
    <button class="btn" id="submitBtn" onclick="submitRenewal()">Submit Renewal Request</button>
  </div>
  <div id="successPage">
    <div class="success-icon">✅</div>
    <div class="success-title">Renewal Requested</div>
    <div class="success-sub">Your request has been received. The Warden will extend your access shortly.</div>
    <a href="/dashboard.html" class="dash-link">Back to Dashboard</a>
  </div>
</div>
<script>
  fetch('/api/member/me').then(r=>r.json()).then(d=>{if(!d.authenticated)window.location.href='/login.html'});
  async function submitRenewal(){
    const btn=document.getElementById('submitBtn'),banner=document.getElementById('errorBanner');
    btn.disabled=true;btn.textContent='Submitting…';banner.style.display='none';
    try{
      const res=await fetch('/api/member/renew',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:document.getElementById('notes').value.trim()})});
      const data=await res.json();
      if(res.ok){document.getElementById('formPage').style.display='none';document.getElementById('successPage').style.display='block'}
      else{banner.textContent=data.error||'Something went wrong.';banner.style.display='block';btn.disabled=false;btn.textContent='Submit Renewal Request'}
    }catch{banner.textContent='Connection error. Please try again.';banner.style.display='block';btn.disabled=false;btn.textContent='Submit Renewal Request'}
  }
</script>

  <footer>
    <a href="/dashboard.html">Members</a>
    &nbsp;·&nbsp;
    <a href="/admin.html">Warden</a>
  </footer>
</body>
</html>
