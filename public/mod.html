<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>Dungeon · Mod Panel</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0b0f0e;--surface:#111915;--surface2:#172118;--border:rgba(52,211,153,0.12);--border2:rgba(52,211,153,0.25);--green:#34d399;--green-bg:rgba(52,211,153,0.08);--green-bg2:rgba(52,211,153,0.15);--text:#e2e8e4;--muted:#6b8f7a;--muted2:#94a3a0;--red:#f87171;--red-bg:rgba(248,113,113,0.1);--amber:#fbbf24;--amber-bg:rgba(251,191,36,0.1)}
    html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif}
    .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
    .logo{font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:var(--green);letter-spacing:0.12em;text-decoration:none}
    .topbar-right{display:flex;align-items:center;gap:20px}
    .greeting{font-size:13px;color:var(--muted2)}
    .topbar-link{font-size:13px;color:var(--muted);text-decoration:none;font-weight:500;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;transition:color .2s}
    .topbar-link:hover{color:var(--text)}

    /* Tier badge */
    .tier-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
    .tier-dot{width:6px;height:6px;border-radius:50%}

    .page{max-width:800px;margin:0 auto;padding:32px 28px 80px}
    .page-title{font-family:'Cinzel',serif;font-size:24px;font-weight:700;color:var(--text);margin-bottom:6px}
    .page-sub{font-size:14px;color:var(--muted2);margin-bottom:28px}
    .divider{height:1px;background:var(--border);margin-bottom:0}

    .section-head{font-size:11px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
    .section-head::after{content:'';flex:1;height:1px;background:var(--border)}

    /* Applicant rows */
    .row-list{display:flex;flex-direction:column}
    .app-row{border-bottom:1px solid var(--border);padding:18px 0;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start}
    .app-row:last-child{border-bottom:none}
    .row-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:3px}
    .row-username{font-size:13px;color:var(--green);margin-bottom:4px}
    .row-email{font-size:13px;color:var(--muted2);margin-bottom:8px}
    .row-meta{display:flex;flex-wrap:wrap;gap:16px}
    .meta-lbl{font-size:10px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
    .meta-val{font-size:13px;color:var(--muted2)}
    .row-notes{margin-top:8px;font-size:13px;color:var(--muted);font-style:italic}
    .row-date{font-size:11px;color:var(--muted);margin-top:6px}
    .row-actions{display:flex;flex-direction:column;align-items:flex-end;gap:7px}
    .act{font-size:12px;font-weight:500;background:none;border:none;border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;padding:6px 12px;transition:background .15s,color .15s;color:var(--muted2)}
    .act:hover{background:var(--surface2);color:var(--text)}
    .act.green{color:var(--green)}
    .act.green:hover{background:var(--green-bg)}
    .act.red{color:var(--red)}
    .act.red:hover{background:var(--red-bg)}

    .empty{text-align:center;padding:48px 0}
    .empty-title{font-size:15px;font-weight:500;color:var(--muted2);margin-bottom:6px}
    .empty-sub{font-size:13px;color:var(--muted)}

    .notice{background:var(--amber-bg);border:1px solid rgba(251,191,36,0.2);border-radius:8px;padding:12px 16px;font-size:13px;color:var(--amber);margin-bottom:24px;line-height:1.6}

    footer{text-align:center;padding:32px 0 0;font-size:12px;color:var(--muted)}
    footer a{color:var(--muted);text-decoration:none}
    footer a:hover{color:var(--text)}

    @media(max-width:767px){.page{padding:20px 14px 60px}.topbar{padding:12px 16px}}
  </style>
</head>
<body>
<div class="topbar">
  <a href="/" class="logo">Dungeon</a>
  <div class="topbar-right">
    <span class="greeting" id="greeting"></span>
    <a href="/dashboard.html" class="topbar-link">Dashboard</a>
  </div>
</div>

<div class="page">
  <div class="page-title">Moderator Panel</div>
  <div class="page-sub">Review and action pending applications.</div>

  <div class="notice">
    When you approve an application, the Warden will be notified by email to create the Stremio account and grant full access.
  </div>

  <div class="section-head">Pending Applications</div>
  <div class="divider" style="margin-bottom:0"></div>
  <div class="row-list" id="applicantList"></div>

  <footer>
    <a href="/dashboard.html">Members</a> &nbsp;·&nbsp; <a href="/directory.html">Directory</a>
  </footer>
</div>

<script>
  fetch('/api/member/me').then(r=>r.json()).then(d=>{
    if (!d.authenticated) { window.location.href='/login.html'; return; }
    const tier = d.profile?.tier;
    if (!['mod','admin','warden'].includes(tier)) { window.location.href='/dashboard.html'; return; }
    const sn = d.profile?.screen_name || d.member?.first_name || '';
    document.getElementById('greeting').textContent = sn ? '@'+sn : '';
    loadApplicants();
  });

  function fmt(dt) { return new Date(dt).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

  async function loadApplicants() {
    const rows = await fetch('/api/mod/applicants').then(r=>r.json());
    const el = document.getElementById('applicantList');
    if (!rows.length) {
      el.innerHTML=`<div class="empty"><div class="empty-title">All clear</div><div class="empty-sub">No pending applications right now.</div></div>`;
      return;
    }
    el.innerHTML = rows.map(r => `
      <div class="app-row" id="row-${r.id}">
        <div>
          <div class="row-name">${r.first_name} ${r.last_name}</div>
          ${r.screen_name ? `<div class="row-username">@${r.screen_name}</div>` : ''}
          <div class="row-email">${r.email}</div>
          <div class="row-meta">
            ${r.phone    ? `<div><div class="meta-lbl">Phone</div><div class="meta-val">${r.phone}</div></div>` : ''}
            ${r.language ? `<div><div class="meta-lbl">Language</div><div class="meta-val">${r.language}</div></div>` : ''}
            ${r.referral ? `<div><div class="meta-lbl">Referred by</div><div class="meta-val">${r.referral}</div></div>` : ''}
          </div>
          ${r.notes ? `<div class="row-notes">${r.notes}</div>` : ''}
        </div>
        <div class="row-actions">
          <button class="act green" onclick="approve('${r.id}', this)">Approve</button>
          <button class="act red"   onclick="deny('${r.id}', this)">Deny</button>
          <div class="row-date">${fmt(r.created_at)}</div>
        </div>
      </div>`).join('');
  }

  async function approve(id, btn) {
    btn.disabled = true; btn.textContent = 'Approving…';
    const res = await fetch(`/api/mod/applicants/${id}/approve`, { method:'POST' });
    if (res.ok) {
      document.getElementById('row-'+id).remove();
      if (!document.querySelector('.app-row')) loadApplicants();
    } else { btn.disabled=false; btn.textContent='Approve'; }
  }

  async function deny(id, btn) {
    if (!confirm('Deny this application?')) return;
    btn.disabled = true; btn.textContent = 'Denying…';
    const res = await fetch(`/api/mod/applicants/${id}/deny`, { method:'POST' });
    if (res.ok) {
      document.getElementById('row-'+id).remove();
      if (!document.querySelector('.app-row')) loadApplicants();
    } else { btn.disabled=false; btn.textContent='Deny'; }
  }
</script>
</body>
</html>
