<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamHub · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c10;
      --surface: #0f1419;
      --surface2: #161d25;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.12);
      --accent: #e8412a;
      --text: #eef2f7;
      --muted: rgba(238,242,247,0.45);
      --muted2: rgba(238,242,247,0.22);
      --green: #3ecf8e;
      --amber: #f5a623;
      --blue: #4a9eff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
      );
      pointer-events: none; z-index: 999;
    }

    /* ── Lock screen ─────────────────────────────────────── */
    #lockScreen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }

    .lock-card {
      background: var(--surface);
      border: 1px solid var(--border2);
      padding: 40px 48px;
      width: 360px;
      position: relative;
      text-align: center;
    }

    .lock-card::before, .lock-card::after {
      content: ''; position: absolute;
      width: 14px; height: 14px;
      border-color: var(--accent); border-style: solid;
    }
    .lock-card::before { top:-1px; left:-1px; border-width: 2px 0 0 2px; }
    .lock-card::after  { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }

    .lock-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .lock-logo span { color: var(--accent); }

    .lock-sub {
      font-size: 12px; color: var(--muted);
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.06em;
      margin-bottom: 32px;
    }

    .lock-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      padding: 14px 16px;
      outline: none;
      text-align: center;
      letter-spacing: 0.2em;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .lock-input:focus { border-color: var(--accent); }

    .lock-btn {
      width: 100%;
      background: var(--accent);
      border: none; color: #fff;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 0.12em;
      padding: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .lock-btn:hover { background: #c7341f; }

    .lock-error {
      margin-top: 12px;
      font-size: 12px; color: var(--accent);
      font-family: 'Space Mono', monospace;
      display: none;
    }

    /* ── Main layout ─────────────────────────────────────── */
    #adminApp { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo {
      display: flex; align-items: center; gap: 12px;
    }

    .logo-mark {
      width: 34px; height: 34px;
      border: 1.5px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px; color: var(--accent);
    }

    .logo-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 0.1em;
    }
    .logo-name span { color: var(--accent); }

    .header-right {
      display: flex; align-items: center; gap: 16px;
    }

    .admin-badge {
      font-family: 'Space Mono', monospace;
      font-size: 10px; letter-spacing: 0.08em;
      border: 1px solid rgba(232,65,42,0.4);
      color: var(--accent);
      padding: 4px 10px;
    }

    .header-link {
      font-size: 12px; color: var(--muted); text-decoration: none;
      letter-spacing: 0.05em; transition: color 0.2s;
    }
    .header-link:hover { color: var(--text); }

    /* ── Stats bar ───────────────────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat {
      background: var(--surface);
      padding: 20px 28px;
    }

    .stat-label {
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); font-weight: 500;
      font-family: 'Space Mono', monospace;
      margin-bottom: 6px;
    }

    .stat-value {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px; letter-spacing: 0.04em;
    }

    /* ── Main content ────────────────────────────────────── */
    .main { padding: 32px; }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }

    .section-title {
      font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted);
      display: flex; align-items: center; gap: 10px;
    }

    .section-title::before {
      content: '';
      width: 3px; height: 14px;
      background: var(--accent);
    }

    .filter-tabs {
      display: flex; gap: 4px;
    }

    .tab {
      padding: 6px 14px;
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--border2);
      background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .tab:hover { color: var(--text); background: var(--surface2); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Request cards ───────────────────────────────────── */
    .request-list { display: flex; flex-direction: column; gap: 12px; }

    .request-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 22px 24px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      transition: border-color 0.15s;
    }

    .request-card:hover { border-color: var(--border2); }

    .req-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 12px;
    }

    .req-avatar {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Mono', monospace;
      font-size: 12px; font-weight: 700;
      flex-shrink: 0;
      border: 1px solid var(--border2);
      color: var(--muted);
    }

    .req-name {
      font-size: 16px; font-weight: 500;
    }

    .req-email {
      font-size: 13px; color: var(--muted);
      font-family: 'Space Mono', monospace;
    }

    .req-fields {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 8px 24px;
    }

    .req-field {
      font-size: 12px;
    }

    .req-field-label {
      color: var(--muted2);
      font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 2px;
    }

    .req-field-value {
      color: var(--text);
    }

    /* Status badge */
    .status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px;
      font-size: 11px; font-weight: 500;
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.04em;
    }

    .status-badge::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%;
    }

    .status-badge.pending  { border:1px solid rgba(245,166,35,0.4); color: var(--amber); }
    .status-badge.pending::before { background: var(--amber); }
    .status-badge.done     { border:1px solid rgba(62,207,142,0.4); color: var(--green); }
    .status-badge.done::before   { background: var(--green); }
    .status-badge.skipped  { border:1px solid var(--border2); color: var(--muted); }
    .status-badge.skipped::before { background: var(--muted); }

    /* Action buttons */
    .req-actions {
      display: flex; flex-direction: column; gap: 6px;
      align-items: flex-end;
    }

    .action-btn {
      padding: 7px 14px;
      font-size: 12px; font-weight: 500;
      border: 1px solid var(--border2);
      background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
    }

    .action-btn:hover { color: var(--text); background: var(--surface2); }
    .action-btn.green { color: var(--green); border-color: rgba(62,207,142,0.35); }
    .action-btn.green:hover { background: rgba(62,207,142,0.08); }
    .action-btn.red { color: var(--accent); border-color: rgba(232,65,42,0.35); }
    .action-btn.red:hover { background: rgba(232,65,42,0.08); }

    .req-date {
      font-size: 11px; color: var(--muted2);
      font-family: 'Space Mono', monospace;
      margin-top: 8px; text-align: right;
    }

    /* Empty state */
    .empty {
      text-align: center; padding: 64px 24px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 40px; margin-bottom: 16px; opacity: 0.4;
    }

    .empty-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px; letter-spacing: 0.08em;
      color: var(--text); margin-bottom: 8px;
    }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 50;
      display: none;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border2);
      padding: 32px;
      width: 480px; max-width: 95vw;
      position: relative;
    }

    .modal::before, .modal::after {
      content: ''; position: absolute;
      width: 12px; height: 12px;
      border-color: var(--accent); border-style: solid;
    }
    .modal::before { top:-1px; left:-1px; border-width: 2px 0 0 2px; }
    .modal::after  { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }

    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 0.08em;
      margin-bottom: 20px;
    }

    .modal-body { font-size: 14px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }
    .modal-body strong { color: var(--text); }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* Stremio link helper */
    .stremio-help {
      background: rgba(232,65,42,0.07);
      border: 1px solid rgba(232,65,42,0.2);
      padding: 14px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .stremio-help a { color: #ff6b52; text-decoration: none; }
    .stremio-help a:hover { text-decoration: underline; }

    .copy-field {
      display: flex; gap: 8px; align-items: center;
      margin-bottom: 12px;
    }

    .copy-field input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      padding: 9px 12px;
      outline: none;
    }

    .copy-mini {
      padding: 9px 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--muted);
      font-size: 12px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.15s; white-space: nowrap;
    }
    .copy-mini:hover { color: var(--text); }
    .copy-mini.copied { color: var(--green); border-color: rgba(62,207,142,0.4); }
  </style>
</head>
<body>

<!-- Lock Screen -->
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-logo">STREAM<span>HUB</span></div>
    <div class="lock-sub">// ADMIN ACCESS</div>
    <input class="lock-input" type="password" id="pinInput" placeholder="••••••" maxlength="20"
      onkeydown="if(event.key==='Enter') unlock()" />
    <button class="lock-btn" onclick="unlock()">ENTER</button>
    <div class="lock-error" id="lockError">Incorrect password</div>
  </div>
</div>

<!-- Admin App -->
<div id="adminApp">
  <header>
    <div class="logo">
      <div class="logo-mark">S</div>
      <div class="logo-name">STREAM<span>HUB</span></div>
    </div>
    <div class="header-right">
      <div class="admin-badge">ADMIN</div>
      <a href="index.html" class="header-link">← Request form</a>
      <a href="#" class="header-link" onclick="logout()">Lock</a>
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <div class="stat-label">Total requests</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="statPending" style="color:var(--amber)">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Completed</div>
      <div class="stat-value" id="statDone" style="color:var(--green)">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Skipped</div>
      <div class="stat-value" id="statSkipped" style="color:var(--muted)">0</div>
    </div>
  </div>

  <div class="main">
    <div class="section-header">
      <div class="section-title">Account Requests</div>
      <div class="filter-tabs">
        <button class="tab active" onclick="setFilter('all', this)">All</button>
        <button class="tab" onclick="setFilter('pending', this)">Pending</button>
        <button class="tab" onclick="setFilter('done', this)">Done</button>
        <button class="tab" onclick="setFilter('skipped', this)">Skipped</button>
      </div>
    </div>

    <div class="request-list" id="requestList"></div>
  </div>
</div>

<!-- Setup modal -->
<div class="modal-overlay" id="setupModal">
  <div class="modal">
    <div class="modal-title">Create Stremio Account</div>

    <div id="setupContent"></div>

    <div class="modal-actions">
      <button class="action-btn" onclick="closeModal()">Cancel</button>
      <button class="action-btn green" onclick="markDone()">✓ Mark as done</button>
    </div>
  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────
  const ADMIN_PASSWORD = 'admin123'; // Change this to your own password!
  // ────────────────────────────────────────────────────────

  let currentFilter = 'all';
  let activeRequestId = null;

  function unlock() {
    const pin = document.getElementById('pinInput').value;
    if (pin === ADMIN_PASSWORD) {
      document.getElementById('lockScreen').style.display = 'none';
      document.getElementById('adminApp').style.display = 'block';
      renderAll();
    } else {
      document.getElementById('lockError').style.display = 'block';
      document.getElementById('pinInput').value = '';
      document.getElementById('pinInput').focus();
    }
  }

  function logout() {
    document.getElementById('lockScreen').style.display = 'flex';
    document.getElementById('adminApp').style.display = 'none';
    document.getElementById('pinInput').value = '';
    document.getElementById('lockError').style.display = 'none';
  }

  function getRequests() {
    return JSON.parse(localStorage.getItem('stremio_requests') || '[]');
  }

  function saveRequests(r) {
    localStorage.setItem('stremio_requests', JSON.stringify(r));
  }

  function initials(r) {
    return ((r.first_name||'')[0] + (r.last_name||'')[0]).toUpperCase();
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderList();
  }

  function renderAll() {
    renderStats();
    renderList();
  }

  function renderStats() {
    const reqs = getRequests();
    document.getElementById('statTotal').textContent = reqs.length;
    document.getElementById('statPending').textContent = reqs.filter(r => r.status === 'pending').length;
    document.getElementById('statDone').textContent = reqs.filter(r => r.status === 'done').length;
    document.getElementById('statSkipped').textContent = reqs.filter(r => r.status === 'skipped').length;
  }

  function renderList() {
    const all = getRequests();
    const reqs = currentFilter === 'all' ? all : all.filter(r => r.status === currentFilter);
    const el = document.getElementById('requestList');

    if (!reqs.length) {
      el.innerHTML = `<div class="empty">
        <div class="empty-icon">📭</div>
        <div class="empty-title">${currentFilter === 'all' ? 'No requests yet' : 'Nothing here'}</div>
        <p>${currentFilter === 'all' ? 'Share the request form link with friends &amp; family.' : 'No ' + currentFilter + ' requests.'}</p>
      </div>`;
      return;
    }

    el.innerHTML = reqs.map(r => `
      <div class="request-card" id="card-${r.id}">
        <div>
          <div class="req-top">
            <div class="req-avatar">${initials(r)}</div>
            <div>
              <div class="req-name">${r.from_name}</div>
              <div class="req-email">${r.email}</div>
            </div>
            <span class="status-badge ${r.status}">${r.status}</span>
          </div>
          <div class="req-fields">
            ${r.phone && r.phone !== 'Not provided' ? `<div class="req-field"><div class="req-field-label">Phone</div><div class="req-field-value">${r.phone}</div></div>` : ''}
            ${r.language && r.language !== 'Not specified' ? `<div class="req-field"><div class="req-field-label">Language</div><div class="req-field-value">${r.language}</div></div>` : ''}
            ${r.referral && r.referral !== 'Not provided' ? `<div class="req-field"><div class="req-field-label">Referred by</div><div class="req-field-value">${r.referral}</div></div>` : ''}
            ${r.notes && r.notes !== 'None' ? `<div class="req-field" style="grid-column:1/-1"><div class="req-field-label">Notes</div><div class="req-field-value">${r.notes}</div></div>` : ''}
          </div>
        </div>
        <div class="req-actions">
          ${r.status === 'pending' ? `
            <button class="action-btn green" onclick="openSetup('${r.id}')">⚡ Setup account</button>
            <button class="action-btn" onclick="setStatus('${r.id}', 'skipped')">Skip</button>
          ` : r.status === 'done' ? `
            <button class="action-btn" onclick="setStatus('${r.id}', 'pending')">Reopen</button>
          ` : `
            <button class="action-btn green" onclick="openSetup('${r.id}')">⚡ Setup</button>
            <button class="action-btn" onclick="setStatus('${r.id}', 'pending')">Reopen</button>
          `}
          <button class="action-btn red" onclick="deleteRequest('${r.id}')">Delete</button>
          <div class="req-date">${r.submitted_at || ''}</div>
        </div>
      </div>
    `).join('');
  }

  function setStatus(id, status) {
    const reqs = getRequests();
    const r = reqs.find(x => x.id === id);
    if (r) { r.status = status; saveRequests(reqs); renderAll(); }
  }

  function deleteRequest(id) {
    if (!confirm('Delete this request?')) return;
    saveRequests(getRequests().filter(x => x.id !== id));
    renderAll();
  }

  function openSetup(id) {
    const reqs = getRequests();
    const r = reqs.find(x => x.id === id);
    if (!r) return;
    activeRequestId = id;

    const stremioSignupUrl = `https://www.stremio.com/register`;
    const addonUrl = `https://stremio-addons.netlify.app/`;

    document.getElementById('setupContent').innerHTML = `
      <div class="stremio-help">
        Use the details below to create <strong>${r.from_name}</strong>'s Stremio account, then clone your addons onto it.
      </div>

      <div style="margin-bottom:20px">
        <div style="font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Account details to use</div>
        <div class="copy-field">
          <input readonly value="${r.email}" />
          <button class="copy-mini" onclick="copyMini(this,'${r.email}')">Copy email</button>
        </div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">
          Suggested password: <code style="font-family:'Space Mono',monospace;color:var(--text);background:var(--surface2);padding:2px 8px;">${generatePassword(r.first_name)}</code>
          <button class="copy-mini" style="margin-left:8px" onclick="copyMini(this,'${generatePassword(r.first_name)}')">Copy</button>
        </div>
      </div>

      <div style="font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:20px">
        <strong style="color:var(--text);display:block;margin-bottom:6px">Steps:</strong>
        1. <a href="${stremioSignupUrl}" target="_blank" style="color:#ff6b52;text-decoration:none">Create account on Stremio ↗</a> using the email above<br>
        2. Log in to <a href="https://web.stremio.com" target="_blank" style="color:#ff6b52;text-decoration:none">web.stremio.com ↗</a> with your own account<br>
        3. Go to <strong style="color:var(--text)">Settings → Addons</strong> and export your addon list<br>
        4. Log in as <strong style="color:var(--text)">${r.from_name}</strong> and import the same addons<br>
        ${r.language && r.language !== 'Not specified' ? `5. Set subtitle language to <strong style="color:var(--text)">${r.language}</strong>` : ''}
      </div>

      ${r.notes && r.notes !== 'None' ? `<div class="stremio-help"><strong>Their notes:</strong> ${r.notes}</div>` : ''}
    `;

    document.getElementById('setupModal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('setupModal').style.display = 'none';
    activeRequestId = null;
  }

  function markDone() {
    if (activeRequestId) {
      setStatus(activeRequestId, 'done');
      closeModal();
    }
  }

  function generatePassword(firstName) {
    const base = (firstName || 'Stream').charAt(0).toUpperCase() + (firstName || 'stream').slice(1).toLowerCase();
    const nums = Math.floor(Math.random() * 900 + 100);
    const syms = ['!', '@', '#', '$', '&'];
    return base + nums + syms[Math.floor(Math.random() * syms.length)];
  }

  function copyMini(btn, text) {
    navigator.clipboard.writeText(text).catch(() => {});
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 1500);
  }

  // Close modal on overlay click
  document.getElementById('setupModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Focus pin on load
  document.getElementById('pinInput').focus();
</script>
</body>
