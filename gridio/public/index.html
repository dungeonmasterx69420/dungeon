<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>GRIDIO - Picks</title>
<link rel="icon" type="image/svg+xml" href="/img/gridio.svg">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#060a0e">
<link rel="apple-touch-icon" href="/img/icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GRIDIO">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Chakra+Petch:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/gridio.css?v=3">
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">
    <img src="/img/gridio.svg" alt="">
    <span>
      <span class="word">GRiDiO</span>
      <span class="sub">NFL PICK'EM</span>
    </span>
  </a>
  <nav>
    <a class="nav-link active" href="/">Picks</a>
    <a class="nav-link" href="/leaderboard.html">Leaderboard</a>
    <a class="nav-link" href="https://yardio.enterdungeon.cc">Yardio</a>
    <button class="btn-ghost" id="btn-refresh" hidden title="Force score refresh">Refresh</button>
    <span class="user-chip" id="user-chip"></span>
    <button class="btn-ghost" onclick="logout()">Out</button>
  </nav>
</header>

<main class="wrap">
  <a class="champ" id="champ" hidden href="#">
    <span class="champ-crown">&#9819;</span>
    <span class="champ-label" id="champ-label"></span>
    <span class="champ-who" id="champ-who"></span>
    <span class="champ-score" id="champ-score"></span>
  </a>

  <div class="week-strip" id="week-strip" aria-label="Week selector"></div>

  <div class="hero">
    <h1>WEEK <em id="hero-week">-</em></h1>
    <div class="hero-status" id="hero-status">Loading the slate...</div>
    <select id="season-sel" class="season-sel" hidden aria-label="Season"></select>
  </div>

  <section class="tally" id="tally" hidden>
    <div class="tally-title" id="tally-title">THiS WEEK</div>
    <div class="tally-rows" id="tally-rows"></div>
  </section>

  <div id="slate"></div>

  <div class="submit-bar" id="submit-bar" hidden></div>

  <div class="eyebrow" id="board-head" hidden>LEAGUE PiCKS</div>
  <div class="table-scroll" id="board-wrap" hidden>
    <table class="board grid-table" id="picks-board"></table>
  </div>

  <div class="footer">THE DUNGEON &middot; GRIDIO</div>
</main>

<nav class="tabbar">
  <a href="/" class="active">PiCKS</a>
  <a href="/leaderboard.html">BOARD</a>
  <a href="https://yardio.enterdungeon.cc">YARDiO</a>
</nav>

<script src="/js/api.js?v=3"></script>
<script src="/js/app.js?v=3"></script>
</body>
</html>
